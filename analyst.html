<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lakon™ Analyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F5F0E8;color:#2C2416;min-height:100vh}
button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border:none}
input,select{font-family:'Plus Jakarta Sans',sans-serif}
a{text-decoration:none;color:inherit}

:root{
  --amber:#C17A3C;--amber-dk:#9E6028;--amber-lt:#F5EBD9;--amber-bd:#E0BA8A;--amber-glow:#E8B86D;
  --sage:#4A7C6B;--sage-dk:#355A4D;--sage-lt:#E6F0EC;
  --ink:#2C2416;--ink-2:#4A3E2E;--mid:#7A6A52;--light:#B0A088;
  --border:#E4D8C8;--cream:#FAF7F2;--linen:#F0EBE0;--white:#FFFDF9;
  --yasa:#B84A3A;--nalar:#3A6B9E;--karya:#C17A3C;--bakti:#4A7C6B;--karsa:#7B5A9E;--tata:#6B7A5A;
  --serif:'Lora',serif;--sans:'Plus Jakarta Sans',sans-serif;
  --r:10px;--r-lg:16px;--r-pill:50px;
  --shadow:0 1px 3px rgba(44,36,22,.06),0 4px 16px rgba(44,36,22,.08);
  --shadow-lg:0 2px 4px rgba(44,36,22,.06),0 12px 32px rgba(44,36,22,.12);
}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ══════════════════════════════
   LOGIN SCREEN
══════════════════════════════ */
#screen-login{
  align-items:center;justify-content:center;
  background:var(--amber);min-height:100vh;
  position:relative;overflow:hidden;
}
#screen-login.active{display:flex}
#screen-login::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 20% 50%,rgba(255,255,255,.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 20%,rgba(232,184,109,.2) 0%,transparent 40%);
  pointer-events:none;
}
.login-box{
  background:var(--white);border-radius:24px;
  padding:3rem 2.5rem;width:100%;max-width:400px;
  box-shadow:var(--shadow-lg);position:relative;z-index:1;
  text-align:center;
}
.login-logo{
  font-family:var(--serif);font-size:28px;font-weight:600;font-style:italic;
  color:var(--ink);margin-bottom:4px;
}
.login-logo em{color:var(--amber);font-style:normal}
.login-badge{
  display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:var(--mid);background:var(--linen);
  padding:4px 12px;border-radius:20px;margin-bottom:2rem;
}
.login-h{font-size:20px;font-weight:700;color:var(--ink);margin-bottom:.5rem}
.login-sub{font-size:13px;color:var(--mid);margin-bottom:2rem;line-height:1.5}
.login-field{
  width:100%;padding:12px 16px;
  border:1.5px solid var(--border);border-radius:var(--r-lg);
  font-size:14px;color:var(--ink);background:var(--cream);
  outline:none;transition:border-color .12s;text-align:center;
  margin-bottom:1rem;
}
.login-field:focus{border-color:var(--amber)}
.login-field::placeholder{color:var(--light)}
.login-btn{
  width:100%;padding:13px;
  background:var(--amber);color:#fff;
  font-size:14px;font-weight:700;border-radius:var(--r-lg);
  transition:all .15s;
}
.login-btn:hover{background:var(--amber-dk)}
.login-error{
  margin-top:12px;font-size:13px;color:#B84A3A;
  display:none;
}
.login-error.show{display:block}

/* ══════════════════════════════
   ANALYST APP LAYOUT
══════════════════════════════ */
#screen-app{display:none;flex-direction:column;min-height:100vh}
#screen-app.active{display:flex}

/* Top nav */
.app-nav{
  background:var(--white);border-bottom:1px solid var(--border);
  height:56px;display:flex;align-items:center;
  padding:0 2rem;gap:1rem;
  position:sticky;top:0;z-index:200;
}
.app-nav-logo{
  font-family:var(--serif);font-size:19px;font-weight:600;font-style:italic;
  color:var(--ink);margin-right:auto;display:flex;align-items:center;gap:8px;
}
.app-nav-logo em{color:var(--amber);font-style:normal}
.app-nav-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--amber);background:var(--amber-lt);
  padding:3px 10px;border-radius:20px;border:1px solid var(--amber-bd);
}
.app-nav-right{display:flex;align-items:center;gap:10px}
.btn-refresh{
  padding:7px 16px;background:var(--linen);color:var(--mid);
  font-size:12px;font-weight:600;border-radius:var(--r-pill);
  border:1px solid var(--border);transition:all .15s;
}
.btn-refresh:hover{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}
.btn-logout{
  padding:7px 16px;background:transparent;color:var(--light);
  font-size:12px;font-weight:600;border-radius:var(--r-pill);
  border:1px solid var(--border);transition:all .15s;
}
.btn-logout:hover{color:var(--mid)}

/* Main content */
.app-main{flex:1;padding:2rem;max-width:1400px;margin:0 auto;width:100%}

/* ── STATS STRIP ── */
.stats-strip{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:1rem;margin-bottom:2rem;
}
.stat-card{
  background:var(--white);border-radius:var(--r-lg);
  border:1px solid var(--border);
  padding:1.25rem 1.5rem;
}
.stat-card-n{
  font-family:var(--serif);font-size:32px;font-weight:600;font-style:italic;
  color:var(--amber);line-height:1;margin-bottom:4px;
}
.stat-card-l{font-size:12px;color:var(--mid);font-weight:500}

/* ── FILTERS ── */
.filters-bar{
  background:var(--white);border-radius:var(--r-lg);
  border:1px solid var(--border);
  padding:1.25rem 1.5rem;margin-bottom:1.5rem;
  display:flex;gap:1rem;align-items:center;flex-wrap:wrap;
}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--light)}
.filter-input,.filter-select{
  padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r);
  font-size:13px;color:var(--ink);background:var(--cream);
  outline:none;transition:border-color .12s;
}
.filter-input:focus,.filter-select:focus{border-color:var(--amber)}
.filter-clear{
  padding:8px 16px;background:var(--linen);color:var(--mid);
  font-size:12px;font-weight:600;border-radius:var(--r-pill);
  border:1px solid var(--border);transition:all .15s;align-self:flex-end;white-space:nowrap;
}
.filter-clear:hover{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}

/* ── TABLE ── */
.table-wrap{
  background:var(--white);border-radius:var(--r-lg);
  border:1px solid var(--border);overflow:hidden;
  box-shadow:var(--shadow);
}
.table-header{
  padding:1rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.table-title{font-size:14px;font-weight:700;color:var(--ink)}
.table-count{font-size:12px;color:var(--mid)}
.resp-table{width:100%;border-collapse:collapse}
.resp-table thead th{
  padding:10px 16px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--light);background:var(--linen);
  border-bottom:1px solid var(--border);white-space:nowrap;
}
.resp-table tbody tr{
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .1s;
}
.resp-table tbody tr:last-child{border-bottom:none}
.resp-table tbody tr:hover{background:var(--amber-lt)}
.resp-table tbody td{padding:12px 16px;font-size:13px;color:var(--ink-2)}

/* Paraga badge in table */
.paraga-badge{
  font-weight:700;color:var(--ink);font-size:13px;
}
.paraga-en{font-size:11px;color:var(--mid);font-weight:400;margin-top:1px}

/* Kelompok pill */
.kel-pill{
  display:inline-block;font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:20px;color:#fff;
}
.kel-Yasa {background:var(--yasa)}
.kel-Nalar{background:var(--nalar)}
.kel-Karya{background:var(--karya)}
.kel-Bakti{background:var(--bakti)}
.kel-Karsa{background:var(--karsa)}
.kel-Tata {background:var(--tata)}

.good-pill{
  display:inline-block;font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:20px;
  border:1px solid var(--border);color:var(--mid);background:var(--linen);
}

/* Empty state */
.empty-state{padding:4rem;text-align:center}
.empty-state-icon{font-size:36px;margin-bottom:1rem;opacity:.3}
.empty-state-text{font-size:14px;color:var(--light)}

/* Loading */
.loading{padding:4rem;text-align:center}
.loading-spinner{
  width:32px;height:32px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--amber);
  animation:spin .8s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--light)}

/* ══════════════════════════════
   REPORT MODAL
══════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(44,36,22,.5);
  z-index:500;display:none;
  align-items:flex-start;justify-content:center;
  padding:2rem 1rem;overflow-y:auto;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--cream);border-radius:20px;
  width:100%;max-width:820px;
  box-shadow:0 8px 40px rgba(44,36,22,.2);
  position:relative;margin:auto;
}
.modal-nav{
  position:sticky;top:0;z-index:10;
  background:rgba(250,247,242,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:1rem 1.5rem;
  display:flex;align-items:center;gap:1rem;
}
.modal-nav-title{
  font-size:14px;font-weight:700;color:var(--ink);flex:1;
}
.btn-print{
  padding:8px 18px;background:var(--amber);color:#fff;
  font-size:12px;font-weight:700;border-radius:var(--r-pill);
  transition:background .15s;display:flex;align-items:center;gap:6px;
}
.btn-print:hover{background:var(--amber-dk)}
.btn-close{
  width:32px;height:32px;border-radius:50%;
  background:var(--linen);color:var(--mid);
  font-size:16px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);transition:all .15s;flex-shrink:0;
}
.btn-close:hover{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}

/* Report content inside modal */
.report-body{padding:2rem 2.5rem 3rem}

/* Report header */
.report-header{
  background:var(--amber);border-radius:16px;
  padding:2.5rem;margin-bottom:2rem;
  position:relative;overflow:hidden;
}
.report-header::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 80% 20%,rgba(232,184,109,.3) 0%,transparent 50%);
  pointer-events:none;
}
.report-eyebrow{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;
  color:rgba(255,255,255,.6);margin-bottom:.75rem;
}
.report-name{
  font-family:var(--serif);font-size:clamp(22px,4vw,36px);
  font-weight:600;color:#fff;letter-spacing:-.2px;
  margin-bottom:4px;line-height:1.15;position:relative;z-index:1;
}
.report-en{
  font-size:14px;color:rgba(255,255,255,.7);
  font-style:italic;margin-bottom:1.25rem;position:relative;z-index:1;
}
.report-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;position:relative;z-index:1}
.rtag{
  font-size:11px;font-weight:700;padding:4px 12px;
  border-radius:var(--r-pill);
}
.rtag-white{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)}
.rtag-amber{background:rgba(255,255,255,.15);color:#fff}
.report-nuance{
  font-size:13px;color:rgba(255,255,255,.7);
  font-style:italic;position:relative;z-index:1;
}

/* Report meta strip */
.report-meta{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border-radius:var(--r-lg);overflow:hidden;
  margin-bottom:2rem;
}
.report-meta-item{
  background:var(--white);padding:1rem 1.25rem;
}
.report-meta-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--light);margin-bottom:3px;
}
.report-meta-value{font-size:13px;font-weight:600;color:var(--ink)}

/* Report section */
.report-section{margin-bottom:2rem}
.report-section-h{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:var(--mid);padding-bottom:8px;
  border-bottom:1px solid var(--border);margin-bottom:.875rem;
  display:flex;align-items:center;gap:8px;
}
.report-section-h::before{
  content:'';width:3px;height:12px;background:var(--amber);
  border-radius:2px;flex-shrink:0;
}
.report-text{font-size:14px;color:var(--ink-2);line-height:1.75}
.report-text p{margin-bottom:.625rem}
.report-text p:last-child{margin-bottom:0}

/* Strength list */
.rpt-strengths{list-style:none;display:flex;flex-direction:column;gap:8px}
.rpt-strength{
  display:flex;align-items:flex-start;gap:10px;
  font-size:14px;color:var(--ink-2);line-height:1.5;font-weight:500;
}
.rpt-strength::before{content:'✓';color:var(--amber);font-weight:800;flex-shrink:0;margin-top:1px}

/* Skills list */
.rpt-skills{list-style:none;display:flex;flex-direction:column;gap:7px;margin-top:.5rem}
.rpt-skill{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13px;color:var(--ink-2);line-height:1.5;
}
.rpt-skill::before{
  content:'→';color:var(--sage);font-weight:700;flex-shrink:0;margin-top:1px;
}
.rpt-skill-lead{
  font-size:11px;font-weight:700;color:var(--sage);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:block;
}

/* Graph bars in report */
.rpt-graph{display:flex;flex-direction:column;gap:8px}
.rpt-graph-row{display:grid;grid-template-columns:140px 1fr 50px;align-items:center;gap:10px}
.rpt-graph-label{font-size:12px;font-weight:600;color:var(--ink);text-align:right}
.rpt-graph-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.rpt-graph-fill{height:100%;border-radius:4px}
.rpt-graph-pct{font-size:11px;font-weight:700}

/* Dim bars */
.rpt-dims{display:flex;flex-direction:column;gap:10px}
.rpt-dim-row{display:grid;grid-template-columns:120px 1fr 55px;align-items:center;gap:10px}
.rpt-dim-label{font-size:12px;font-weight:600;color:var(--ink);text-align:right}
.rpt-dim-track{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.rpt-dim-fill{height:100%;border-radius:4px;background:var(--amber)}
.rpt-dim-pct{font-size:11px;font-weight:700;color:var(--amber)}

/* Two-col layout in report */
.report-2col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}

/* ══════════════════════════════
   PRINT STYLES
══════════════════════════════ */
@media print {
  body{background:#fff !important}
  .app-nav,.modal-nav,.modal-overlay > *:not(.modal){display:none !important}
  .modal-overlay{
    position:static !important;background:none !important;
    padding:0 !important;display:block !important;
  }
  .modal{
    border-radius:0 !important;box-shadow:none !important;
    max-width:100% !important;
  }
  .report-body{padding:1.5rem !important}
  .report-header{border-radius:8px !important}
  .report-section{break-inside:avoid}
  #screen-app,#screen-login{display:none !important}
  .modal-overlay{display:block !important}
  @page{margin:1.5cm;size:A4}
}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media(max-width:900px){
  .stats-strip{grid-template-columns:repeat(3,1fr)}
  .app-main{padding:1.25rem}
  .report-meta{grid-template-columns:repeat(2,1fr)}
  .report-2col{grid-template-columns:1fr}
  .rpt-graph-row{grid-template-columns:100px 1fr 44px}
}
@media(max-width:600px){
  .stats-strip{grid-template-columns:repeat(2,1fr)}
  .resp-table thead th:nth-child(n+5){display:none}
  .resp-table tbody td:nth-child(n+5){display:none}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">Lakon<em>™</em></div>
    <div class="login-badge">Analyst Dashboard</div>
    <h2 class="login-h">Masuk ke Dashboard</h2>
    <p class="login-sub">Hanya untuk tim admin Mitologi Inspira.</p>
    <input class="login-field" type="password" id="login-password"
      placeholder="Masukkan password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Masuk →</button>
    <div class="login-error" id="login-error">Password salah. Coba lagi.</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="screen-app" class="screen">

  <!-- Nav -->
  <nav class="app-nav">
    <div class="app-nav-logo">
      Lakon<em>™</em>
      <span class="app-nav-badge">Analyst</span>
    </div>
    <div class="app-nav-right">
      <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="app-main">

    <!-- Stats strip -->
    <div class="stats-strip" id="stats-strip">
      <div class="stat-card"><div class="stat-card-n" id="stat-total">—</div><div class="stat-card-l">Total Peserta</div></div>
      <div class="stat-card"><div class="stat-card-n" id="stat-batch">—</div><div class="stat-card-l">Batch</div></div>
      <div class="stat-card"><div class="stat-card-n" id="stat-company">—</div><div class="stat-card-l">Perusahaan</div></div>
      <div class="stat-card"><div class="stat-card-n" id="stat-top-kel">—</div><div class="stat-card-l">Kelompok Terbanyak</div></div>
      <div class="stat-card"><div class="stat-card-n" id="stat-top-wat">—</div><div class="stat-card-l">Watak Terbanyak</div></div>
    </div>

    <!-- Breakdown bar charts -->
    <div id="breakdown-row" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;display:none">
      <div style="background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:1.25rem 1.5rem">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-bottom:1rem">Distribusi Kelompok</div>
        <div id="chart-kelompok"></div>
      </div>
      <div style="background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:1.25rem 1.5rem">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-bottom:1rem">Distribusi Watak</div>
        <div id="chart-watak"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-group" style="flex:2;min-width:200px">
        <label class="filter-label">Cari</label>
        <input class="filter-input" type="text" id="f-search"
          placeholder="Nama atau email..." oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <label class="filter-label">Batch</label>
        <select class="filter-select" id="f-batch" onchange="applyFilters()">
          <option value="">Semua Batch</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Perusahaan</label>
        <select class="filter-select" id="f-company" onchange="applyFilters()">
          <option value="">Semua Perusahaan</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Kelompok</label>
        <select class="filter-select" id="f-kelompok" onchange="applyFilters()">
          <option value="">Semua Kelompok</option>
          <option>Yasa</option><option>Nalar</option><option>Karya</option>
          <option>Bakti</option><option>Karsa</option><option>Tata</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Watak</label>
        <select class="filter-select" id="f-watak" onchange="applyFilters()">
          <option value="">Semua Watak</option>
          <option>Reka</option><option>Logika</option><option>Jaga</option><option>Guna</option>
        </select>
      </div>
      <button class="filter-clear" onclick="clearFilters()">✕ Reset</button>

  "Karsa|Guna":"Pekerjaan back-office atau analytical yang mengisolasi mereka dari interaksi manusia akan menghilangkan kekuatan terbesar mereka. Target yang hanya bisa dicapai sendiri tanpa kolaborasi juga tidak optimal.",
  "Nalar|Reka":"Riset yang murni transaksional — dilakukan untuk memenuhi KPI bukan karena keingintahuan sejati — akan terasa hampa. Lingkungan akademis yang terlalu berfokus pada metodologi tanpa peduli dampak nyata juga bisa mengecilkan semangat mereka.",
  "Nalar|Logika":"Tekanan untuk menghasilkan insight cepat dengan data yang tidak memadai akan sangat mengganggu standar kerja mereka. Lingkungan yang menginginkan 'cerita yang bagus' daripada 'kebenaran yang akurat' adalah tempat yang salah.",

  "Nalar|Guna":"Riset murni yang tidak berujung pada aplikasi praktis akan terasa sia-sia. Terlalu banyak rapat dan presentasi tanpa kesempatan untuk benar-benar mengimplementasikan sesuatu akan mengurangi kepuasan kerja secara drastis.",
  "Yasa|Reka":"Proyek yang murni fungsional tanpa dimensi makna akan terasa hampa. Lingkungan yang menuntut output massal dan cepat tanpa ruang refleksi akan menguras energi mereka lebih cepat dari yang mereka sadari.",
  "Yasa|Logika":"Pekerjaan repetitif yang tidak menuntut pemikiran baru akan membosankan dengan cepat. Birokrasi yang menghambat implementasi solusi yang sudah jelas akan menjadi sumber frustrasi kronis.",
  "Yasa|Jaga":"Lingkungan yang terus berubah tanpa arah jelas akan membuat mereka tidak bisa bekerja optimal. Ekspektasi yang tidak konsisten dari atasan atau klien adalah sumber stres terbesar mereka.",
  "Yasa|Guna":"Pekerjaan administratif atau desk-based yang menjauhkan mereka dari lapangan akan terasa seperti hukuman. Proses persetujuan yang panjang sebelum bisa bertindak akan sangat menghambat.",
  "Tata|Reka":"Bekerja di organisasi yang membangun sistem untuk kontrol semata, bukan untuk tujuan yang lebih besar, akan terasa seperti penyalahgunaan keahlian mereka. Birokrasi yang tidak punya tujuan jelas adalah lingkungan yang paling menghambat.",
  "Tata|Logika":"Menjaga sistem yang sudah rusak tanpa wewenang untuk memperbaikinya adalah salah satu sumber frustrasi terbesar mereka. Organisasi yang resistance to change secara institusional akan terus menghambat.",
  "Tata|Jaga":"Startup atau lingkungan yang berubah terlalu cepat akan membuat mereka tidak bisa bekerja optimal. Prioritas yang berubah-ubah setiap minggu adalah sumber kecemasan yang nyata.",
  "Tata|Guna":"Pekerjaan yang terlalu kaku tanpa ruang untuk penyesuaian taktis akan membatasi efektivitas mereka. Aturan demi aturan tanpa tujuan yang jelas akan membuat mereka tidak termotivasi.",
};

// AUTH

function doLogin() {
  const pw = document.getElementById('login-password').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('lakon_auth', '1');
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-app').classList.add('active');
    loadData();
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
  }
}

function doLogout() {
  sessionStorage.removeItem('lakon_auth');
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-password').value = '';
}

// Auto-login check
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('lakon_auth') === '1') {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-app').classList.add('active');
    loadData();
  }
});

// DATA LOADING
// ══════════════════════════════════════════════════════════
async function loadData() {
  document.getElementById('table-body').innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Memuat data dari Google Sheets...</div>
    </div>`;

  try {
    const url = `${APPS_SCRIPT_URL}?action=list&token=${encodeURIComponent(ADMIN_PASSWORD)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) throw new Error(data.error);
    allRows = data.rows || [];
    buildFilters();
    applyFilters();
    updateStats();
  } catch(e) {
    document.getElementById('table-body').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠</div>
        <div class="empty-state-text">Gagal memuat data: ${e.message}<br>
        Pastikan Apps Script sudah di-deploy dan token sudah dikonfigurasi.</div>
      </div>`;
    console.error(e);
  }
}

// FILTERS & TABLE
// ══════════════════════════════════════════════════════════
function buildFilters() {
  const batches   = [...new Set(allRows.map(r=>r.batch_id).filter(Boolean))].sort();
  const companies = [...new Set(allRows.map(r=>r.participant_company).filter(Boolean))].sort();

  const bSel = document.getElementById('f-batch');
  bSel.innerHTML = '<option value="">Semua Batch</option>' +
    batches.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('');

  const cSel = document.getElementById('f-company');
  cSel.innerHTML = '<option value="">Semua Perusahaan</option>' +
    companies.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}

function applyFilters() {
  const search  = document.getElementById('f-search').value.toLowerCase().trim();
  const batch   = document.getElementById('f-batch').value;
  const company = document.getElementById('f-company').value;
  const kel     = document.getElementById('f-kelompok').value;
  const wat     = document.getElementById('f-watak').value;

  filteredRows = allRows.filter(r => {
    if (search && !(`${r.participant_name} ${r.participant_email}`).toLowerCase().includes(search)) return false;
    if (batch   && r.batch_id !== batch) return false;
    if (company && r.participant_company !== company) return false;
    if (kel     && r.kelompok_best_fit !== kel) return false;
    if (wat     && r.watak !== wat) return false;
    return true;
  });

  renderTable();
}

function clearFilters() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-batch').value = '';
  document.getElementById('f-company').value = '';
  document.getElementById('f-kelompok').value = '';
  document.getElementById('f-watak').value = '';
  applyFilters();
}

function renderTable() {
  const count = filteredRows.length;
  document.getElementById('table-count').textContent = `${count} peserta`;

  if (count === 0) {
    document.getElementById('table-body').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">○</div>
        <div class="empty-state-text">Tidak ada data yang sesuai filter.</div>
      </div>`;
    return;
  }

  const rows = filteredRows.map((r,i) => {
    const k1col = KEL_COLORS[r.kelompok_best_fit] || '#888';
    const date  = r.timestamp ? new Date(r.timestamp).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    return `<tr onclick="openReport(${i})">
      <td>
        <div style="font-weight:600">${esc(r.participant_name||'—')}</div>
        <div style="font-size:11px;color:var(--mid)">${esc(r.participant_email||'')}</div>
      </td>
      <td>
        <div class="paraga-badge">${esc(r.kelompok_best_fit||'—')} ${esc(r.watak||'')}</div>
        <div class="paraga-en">${esc(r.paraga_en||'')}</div>
      </td>
      <td>
        <span class="kel-pill kel-${r.kelompok_best_fit}">${esc(r.kelompok_best_fit||'—')}</span>
        <span style="font-size:11px;color:var(--mid);margin-left:4px">${r.kelompok_best_pct||0}%</span>
      </td>
      <td>
        <span class="good-pill">${esc(r.kelompok_good_fit||'—')}</span>
        <span style="font-size:11px;color:var(--mid);margin-left:4px">${r.kelompok_good_pct||0}%</span>
      </td>
      <td>${esc(r.batch_id||'—')}</td>
      <td style="font-size:12px;color:var(--mid)">${esc(r.participant_company||'—')}</td>
      <td style="font-size:11px;color:var(--light)">${date}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-body').innerHTML = `
    <table class="resp-table">
      <thead>
        <tr>
          <th>Peserta</th>
          <th>Paraga</th>
          <th>Best Fit</th>
          <th>Nuansa Kelompok</th>
          <th>Batch</th>
          <th>Perusahaan</th>
          <th>Tanggal</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function updateStats() {
  renderCharts();
  const total = allRows.length;
  const batches   = new Set(allRows.map(r=>r.batch_id).filter(Boolean)).size;
  const companies = new Set(allRows.map(r=>r.participant_company).filter(Boolean)).size;

  // Top kelompok
  const kelCount = {};
  allRows.forEach(r=>{ if(r.kelompok_best_fit) kelCount[r.kelompok_best_fit]=(kelCount[r.kelompok_best_fit]||0)+1; });
  const topKel = Object.entries(kelCount).sort((a,b)=>b[1]-a[1])[0];

  // Top watak
  const watCount = {};
  allRows.forEach(r=>{ if(r.watak) watCount[r.watak]=(watCount[r.watak]||0)+1; });
  const topWat = Object.entries(watCount).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-batch').textContent   = batches;
  document.getElementById('stat-company').textContent = companies;
  document.getElementById('stat-top-kel').textContent = topKel ? topKel[0] : '—';
  document.getElementById('stat-top-wat').textContent = topWat ? topWat[0] : '—';
}

  "Bakti|Logika":["Bakti Logika memimpin dengan sistem dan data, tapi selalu dengan manusia sebagai tujuan akhir. Mereka adalah pemimpin HR atau L&D yang bisa berbicara dengan bahasa bisnis sekaligus bahasa manusia. Yang membuat mereka paling hidup dalam kepemimpinan adalah ketika ada tantangan nyata yang membutuhkan solusi sistemik baru.","Tantangan: memastikan sistem yang dibangun tidak kehilangan sentuhan manusiawi saat diimplementasikan dalam skala besar."],
  "Bakti|Jaga":["Bakti Jaga memimpin dengan konsistensi dan rasa aman yang diberikan kepada tim dan orang yang dilayani. Cara memimpin mereka adalah dengan menjadi teladan etika dan keandalan. Sebagian memimpin dengan nilai dan norma yang jelas, sebagian lagi dengan efisiensi dan standar layanan yang terukur.","Tantangan: mengadvokasi perubahan ketika sistem yang ada sudah tidak lagi melayani dengan baik."],
  "Bakti|Guna":["Bakti Guna memimpin dari garis terdepan — dengan tindakan, bukan pidato. Tim mereka mengikuti karena melihat langsung bagaimana mereka bekerja dan betapa genuinely mereka peduli. Sebagian memimpin dengan kehangatan, sebagian lagi dengan fokus pada tantangan yang menarik di lapangan.","Tantangan: dokumentasi, perencanaan jangka panjang, dan delegasi yang efektif kepada orang yang bekerja dengan cara berbeda."],
  "Karsa|Reka":["Karsa Reka memimpin dengan cerita dan visi yang membuat orang merasa menjadi bagian dari sesuatu yang lebih besar. Keputusan mereka hampir selalu berakar pada nilai dan apa yang terasa benar secara moral. Mereka menghargai tim yang mau saling mendukung dalam satu misi yang bermakna.","Tantangan terbesar: fase scaling yang membutuhkan lebih banyak sistem dan proses — mereka sangat membutuhkan partner operasional yang kuat."],
  "Karsa|Logika":["Karsa Logika adalah pemimpin yang paling lengkap: visioner sekaligus eksekutif, strategis sekaligus taktis. Mereka mengutamakan efektivitas dan kompetensi di atas segalanya, dan mengharapkan hal yang sama dari tim mereka. Yang membuat mereka paling hidup dalam kepemimpinan adalah ketika ada tantangan nyata yang belum ada jawabannya.","Tantangan: kesabaran dengan orang yang berpikir lebih lambat, dan kemampuan merayakan pencapaian kecil di perjalanan menuju target besar."],
  "Karsa|Jaga":["Karsa Jaga memimpin dengan konsistensi nilai dan kemampuan membangun kepercayaan yang butuh waktu tapi sangat kokoh. Sebagian memimpin dengan nilai dan norma yang jelas, sebagian lagi dengan efisiensi dan ekspektasi kinerja yang terukur. Keduanya berbagi keyakinan yang sama: bahwa kepemimpinan yang baik adalah kepemimpinan yang bisa diandalkan.","Tantangan: merespons peluang disrupsi yang membutuhkan keberanian mengubah cara yang sudah terbukti."],
  "Karsa|Guna":["Karsa Guna memimpin dengan energi dan kepercayaan personal yang sangat kuat. Gaya kepemimpinan mereka sangat relationship-based. Sebagian memimpin dengan kehangatan dan semangat, sebagian lagi mendorong tim untuk menemukan solusi paling efektif.","Tantangan: sistem, dokumentasi, dan konsistensi proses."],
  "Nalar|Reka":["Nalar Reka memimpin dengan visi intelektual dan kemampuan menginspirasi orang untuk peduli pada pertanyaan yang mungkin belum mereka sadari pentingnya. Keputusan mereka hampir selalu berakar pada nilai dan apa yang terasa benar secara moral — mereka menghargai tim yang peduli pada dampak.","Tantangan: terkadang terlalu idealistis tentang apa yang bisa dicapai dalam keterbatasan sumber daya dan waktu."],
  "Nalar|Logika":["Nalar Logika memimpin dengan standar intelektual yang tidak bisa dikompromikan. Tim riset di bawah mereka tahu bahwa klaim harus didukung bukti dan metodologi harus defensible. Yang membuat mereka paling hidup adalah ketika ada tantangan nyata yang belum ada jawabannya.","Tantangan: membangun motivasi dan kepercayaan emosional dalam tim — gaya mereka bisa terasa demanding bahkan bagi anggota tim yang kompeten."],
  "Nalar|Jaga":["Nalar Jaga memimpin dengan integritas proses yang tidak bisa ditawar. Dalam tim riset, mereka memastikan setiap langkah terdokumentasi dan setiap protokol diikuti. Sebagian memimpin dengan nilai dan norma yang jelas, sebagian lagi dengan efisiensi dan standar yang terukur.","Tantangan: mendorong perubahan atau inovasi metodologis yang dibutuhkan ketika protokol yang ada sudah tidak lagi memadai."],
  "Nalar|Guna":["Nalar Guna memimpin dengan kecepatan diagnosis dan kejelasan langkah berikutnya. Gaya kepemimpinan mereka sangat situasional. Sebagian memimpin dengan kehangatan, sebagian lagi mendorong tim untuk menemukan solusi paling efektif dari data yang tersedia.","Tantangan: memastikan tim tidak bergerak terlalu cepat melewati analisis yang benar-benar diperlukan."],
  "Yasa|Reka":["Yasa Reka memimpin dengan contoh konkret, bukan instruksi. Gaya kepemimpinan mereka adalah 'ikuti kalau kamu mau tahu caranya'. Keputusan mereka hampir selalu berakar pada nilai dan apa yang terasa benar secara moral — mereka menghargai tim yang menghargai integritas dan makna di balik pekerjaan.","Tantangan: belajar mendelegasikan tanpa merasa kualitas akan dikompromikan."],
  "Yasa|Logika":["Yasa Logika memimpin dengan argumen dan sistem yang tak terbantahkan. Mereka tidak membutuhkan banyak otoritas formal — orang mengikuti mereka karena logika mereka jelas dan solusi mereka bekerja. Mereka mengutamakan efektivitas dan kompetensi di atas segalanya.","Tantangan: komunikasi emosional — mereka tahu jawaban yang benar, tapi tidak selalu tahu cara menyampaikannya agar orang merasa didengar terlebih dulu."],
  "Yasa|Jaga":["Yasa Jaga memimpin dengan konsistensi dan kepercayaan yang dibangun dari waktu ke waktu. Mereka hadir setiap hari, memastikan standar terjaga. Sebagian memimpin dengan nilai dan norma yang jelas, sebagian lagi dengan efisiensi dan ekspektasi kinerja yang terukur.","Tantangan: adaptasi cepat saat situasi berubah tiba-tiba, dan memberi ruang untuk tim mencoba cara baru."],
  "Yasa|Guna":["Yasa Guna memimpin dari lapangan, bukan dari rapat. Cara mereka memotivasi bukan lewat kata-kata inspiratif, tapi lewat tindakan nyata. Sebagian memimpin dengan semangat dan kehangatan, sebagian lagi dengan fokus pada tantangan dan solusi lapangan.","Tantangan: komunikasi ke atas dan manajemen ekspektasi dengan stakeholder non-teknis."],
  "Tata|Reka":["Tata Reka memimpin dengan keyakinan bahwa sistem yang baik adalah cara paling konsisten untuk mewujudkan nilai. Gaya kepemimpinan mereka cohesive dan purpose-driven. Keputusan mereka hampir selalu berakar pada nilai dan apa yang terasa benar secara moral.","Tantangan: memimpin di organisasi yang sistemnya korup atau tidak sejalan dengan nilai — mereka perlu kemampuan bergerak dalam keterbatasan sambil tetap menjaga integritas."],
  "Tata|Logika":["Tata Logika memimpin dengan diagnosis yang tajam dan solusi yang tidak bisa dibantah logikanya. Mereka mengutamakan efektivitas dan kapasitas tim di atas segalanya. Yang membuat mereka paling hidup adalah ketika ada tantangan transformasi sistemik yang nyata.","Tantangan: resistance to change dari orang-orang yang merasa terancam oleh perbaikan yang mereka usulkan — dan kemampuan mengelola dinamika ini dengan empati."],
  "Tata|Jaga":["Tata Jaga memimpin dengan keandalan yang tidak tertandingi dan kemampuan membuat semua orang tahu persis apa yang diharapkan. Sebagian memimpin dengan nilai dan norma yang jelas, sebagian lagi dengan efisiensi dan ekspektasi kinerja yang terukur. Keduanya berbagi keyakinan yang sama: bahwa kepemimpinan yang baik adalah kepemimpinan yang bisa diandalkan.","Tantangan: merespons inovasi atau peluang baru yang membutuhkan fleksibilitas yang tidak natural bagi mereka."],
  "Tata|Guna":["Tata Guna memimpin dengan efisiensi yang adaptif — mereka tahu cara mencapai target melalui jalan yang paling efektif. Sebagian memimpin dengan kehangatan dan semangat, sebagian lagi mendorong tim mencari solusi lapangan paling efektif.","Tantangan: mendokumentasikan proses yang mereka kembangkan agar bisa direplikasi oleh orang lain."],
};

function getDalamMemimpin(key, part) {
  const d = MEMIMPIN[key];
  if (!d) return '—';
  return d[part-1] || '—';
}
function getDalamBersosialisasi(key) { return BERSOSIALISASI[key] || '—'; }

// ══════════════════════════════════════════════════════════
// EXPORT CSV
// ══════════════════════════════════════════════════════════
function exportCSV() {
  if (!filteredRows.length) return;
  const cols = ['participant_name','participant_email','participant_company','batch_id',
    'paraga_id','paraga_en','kelompok_best_fit','kelompok_best_pct',
    'kelompok_good_fit','kelompok_good_pct','watak','mbti_type','timestamp'];
  const header = cols.join(',');
  const rows = filteredRows.map(r =>
    cols.map(c => `"${String(r[c]||'').replace(/"/g,'""')}"`).join(',')
  );
  const csv  = [header, ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `lakon_export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════════════
// BREAKDOWN CHARTS
// ══════════════════════════════════════════════════════════
function renderCharts() {
  if (!allRows.length) return;
  document.getElementById('breakdown-row').style.display = 'grid';

  renderBar('chart-kelompok', countBy('kelompok_best_fit'), KEL_COLORS);
  renderBar('chart-watak',    countBy('watak'), {
    Reka:'#C17A3C', Logika:'#3A6B9E', Jaga:'#4A7C6B', Guna:'#7B5A9E'
  });
}

function countBy(field) {
  const counts = {};
  allRows.forEach(r => {
    const v = r[field];
    if (v) counts[v] = (counts[v]||0) + 1;
  });
  return Object.entries(counts).sort((a,b) => b[1]-a[1]);
}

function renderBar(elId, entries, colorMap) {
  const el    = document.getElementById(elId);
  const max   = entries[0]?.[1] || 1;
  el.innerHTML = entries.map(([k,n]) => {
    const pct   = Math.round(n/allRows.length*100);
    const color = colorMap[k] || '#B0A088';
    const w     = Math.round(n/max*100);
    return `<div style="display:grid;grid-template-columns:80px 1fr 40px;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:12px;font-weight:600;color:var(--ink);text-align:right">\${k}</div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:\${w}%;background:\${color};border-radius:4px;transition:width .4s"></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:\${color}">\${n} <span style="color:var(--light);font-weight:400">(\${pct}%)</span></div>
    </div>`;
  }).join('');
}

// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key === 'p') {
    const modal = document.getElementById('modal-overlay');
    if (modal.classList.contains('open')) { e.preventDefault(); window.print(); }
  }
});

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
